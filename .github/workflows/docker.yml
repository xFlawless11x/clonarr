name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      # v2.1.0 release-candidate branch — builds preview image with :v2.1.0-rc
      # tag for external testers (TRaSH, contributors) while the refactor PR
      # is still open. Removed from this list when v2.1.0 tags stable.
      - refactor/go-internal-layout
    tags: ['v*']
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registries after build'
        required: false
        default: true
        type: boolean

env:
  IMAGE_NAME: clonarr

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Promote to job env so we can reference it in `if:` conditions.
      # The secrets context is unavailable to the workflow validator, causing
      # "Unrecognized named-value: 'secrets'" if used directly in `if:`.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU (for multi-arch arm64 builds)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only runs when DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are configured.
      # Forks without Docker Hub credentials skip this step gracefully.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ env.DOCKERHUB_USERNAME != '' && format('docker.io/{0}/{1}', env.DOCKERHUB_USERNAME, env.IMAGE_NAME) || '' }}
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=v2.1.0-rc,enable=${{ github.ref == 'refs/heads/refactor/go-internal-layout' }}
            type=semver,pattern=v{{version}}
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "value=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image }}
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
